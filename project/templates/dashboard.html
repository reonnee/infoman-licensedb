<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Portal Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') if not None else 'styles.css' }}">
</head>
<body class="bg-light">

<div class="container my-5 text-center">
    <div class="card shadow-lg p-5 bg-white rounded-3">
        <h1 class="display-5 fw-bold text-dark mb-3">Driver's License Database System</h1>
        <p class="lead text-muted mb-5">Select an option below.</p>
        
        <div class="row g-4 justify-content-center">
            <div class="col-md-5">
                <div class="card h-100 p-4 border border-2 border-light shadow-sm hover-card">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h3 class="card-title text-primary fw-semibold mb-3">Application Form</h3>
                            <p class="card-text text-secondary">Submit a <strong>new application</strong> or <strong>renew</strong> an existing license.</p>
                        </div>
                        <a href="/apply" class="btn btn-primary btn-lg mt-4 w-100 fw-bold">Open Form</a>
                    </div>
                </div>
            </div>
            
            <div class="col-md-5">
                <div class="card h-100 p-4 border border-2 border-light shadow-sm hover-card">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h3 class="card-title text-success fw-semibold mb-3">View Database Records</h3>
                            <p class="card-text text-secondary">View and Search previous license applications.</p>
                        </div>
                        <a href="/records" class="btn btn-success btn-lg mt-4 w-100 fw-bold">Manage Database Registry</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
